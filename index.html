<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Feedback Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Bricolage+Grotesque:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif:  ['Instrument Serif', 'Georgia', 'serif'],
            mono:   ['IBM Plex Mono', 'monospace'],
            sans:   ['Bricolage Grotesque', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --border-hi: #30363d;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --faint:     #21262d;

      --pos:  #39d353;
      --neg:  #f85149;
      --neu:  #58a6ff;

      --cat-ux:      #c084fc;
      --cat-perf:    #fb923c;
      --cat-feat:    #34d399;
      --cat-bug:     #f87171;
      --cat-other:   #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    .card-pos { border-left: 3px solid var(--pos); }
    .card-neg { border-left: 3px solid var(--neg); }
    .card-neu { border-left: 3px solid var(--neu); }

    .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-pos { background: rgba(57,211,83,.12); color: var(--pos); border: 1px solid rgba(57,211,83,.25); }
    .badge-neg { background: rgba(248,81,73,.12); color: var(--neg); border: 1px solid rgba(248,81,73,.25); }
    .badge-neu { background: rgba(88,166,255,.12); color: var(--neu); border: 1px solid rgba(88,166,255,.25); }

    .badge-open       { background: rgba(125,133,144,.1); color: var(--muted); border: 1px solid rgba(125,133,144,.2); }
    .badge-inprogress { background: rgba(210,153,34,.12); color: #d2a22a;      border: 1px solid rgba(210,153,34,.25); }
    .badge-addressed  { background: rgba(57,211,83,.1);   color: #39d353;      border: 1px solid rgba(57,211,83,.2); }

    .badge-source   { background: rgba(125,133,144,.08); color: var(--muted); border: 1px solid var(--border-hi); }
    .badge-category { background: rgba(88,166,255,.08);  color: #58a6ff;      border: 1px solid rgba(88,166,255,.2); }

    .ctrl {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      color: var(--text);
      border-radius: 6px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    .ctrl::placeholder { color: var(--muted); }
    .ctrl:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,.12);
    }
    textarea.ctrl { resize: vertical; min-height: 88px; }

    /* filter select — identical appearance regardless of selected value */
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      color: var(--text);
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 28px 6px 10px;
      appearance: none;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-select:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,.12);
    }
    /* Active: border + text of the closed button turn blue */
    .filter-select.active {
      border-color: rgba(88,166,255,.55);
      color: #58a6ff;
    }
    /* Options must always be white — they must NOT inherit the blue from .active */
    .filter-select option,
    .filter-select.active option {
      color: #e6edf3;
      background: #1c2333;
    }

    .btn-primary {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-primary:hover  { background: #2ea043; }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .btn-ghost:hover { color: var(--neg); border-color: var(--neg); background: rgba(248,81,73,.06); }

    .btn-clear {
      background: rgba(210,153,34,.08);
      color: #d2a22a;
      border: 1px solid rgba(210,153,34,.25);
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
    }
    .btn-clear:hover { background: rgba(210,153,34,.15); border-color: rgba(210,153,34,.4); }

    .btn-ai {
      background: rgba(88,166,255,.1);
      color: #58a6ff;
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ai:hover { background: rgba(88,166,255,.18); border-color: rgba(88,166,255,.5); }
    .btn-ai:disabled { opacity: .45; cursor: not-allowed; }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      border: 1px solid transparent;
    }
    .cat-row:hover { background: rgba(255,255,255,.04); }
    .cat-row.active { background: rgba(255,255,255,.05); border-color: var(--border-hi); }

    .progress-track {
      flex: 1;
      height: 5px;
      background: var(--faint);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .45s cubic-bezier(.22,1,.36,1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .22s ease-out both; }

    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50%       { opacity: .8; }
    }
    .skel { animation: pulse 1.4s ease-in-out infinite; background: var(--faint); border-radius: 4px; }

    @keyframes authIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-in { animation: authIn .28s ease-out; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    /* Modal */
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes backdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .modal-backdrop {
      animation: backdropIn 0.18s ease-out forwards;
    }
    .modal-panel {
      animation: modalIn 0.2s ease-out forwards;
    }

    /* Clickable card */
    .feedback-card-clickable {
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .12s;
    }
    .feedback-card-clickable:hover {
      border-color: var(--border-hi) !important;
      background: #1a2130 !important;
      transform: translateY(-1px);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
  </style>
</head>

/* ── Groq ── */
async function runGroqAnalysis(items) {
  const activeItems = items.filter(i => i.status === 'open' || i.status === 'inprogress');
  if (activeItems.length === 0) return null;

  const formatted = activeItems.map((item, idx) =>
    `[${idx+1}] Status: ${item.status} | Sentiment: ${item.sentiment} | Category: ${item.category} | Source: ${item.source}\n${item.title ? 'Title: ' + item.title + '\n' : ''}Feedback: ${item.content}`
  ).join('\n\n');

  const prompt = `You are a product feedback analyst. Analyze the following open/in-progress feedback items and return a structured JSON analysis.

Feedback items:
${formatted}

Return ONLY a valid JSON object with this exact structure (no markdown, no extra text):
{
  "prioritized": [
    { "rank": 1, "title": "short title", "reason": "explanation", "sentiment": "Positive|Negative|Neutral", "category": "category", "feedbackIndex": 1 }
  ],
  "canWait": [
    { "title": "short title", "reason": "why this can wait", "feedbackIndex": 2 }
  ],
  "topLoved": ["thing 1", "thing 2", "thing 3"],
  "topPainPoints": [
    {"point": "pain point", "severity": "high|medium|low"}
  ],
  "summary": "2-3 sentence overall summary"
}`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Groq API error ${res.status}`);
  }
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content || '';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

/* ── Auth ── */
function AuthForm() {
  const [mode, setMode]       = React.useState('login');
  const [email, setEmail]     = React.useState('');
  const [pass, setPass]       = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState('');

  async function submit(e) {
    e.preventDefault(); setError(''); setLoading(true);
    const { error: err } = await (mode === 'login'
      ? sb.auth.signInWithPassword({ email, password: pass })
      : sb.auth.signUp({ email, password: pass }));
    if (err) setError(err.message);
    setLoading(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="auth-in w-full max-w-sm">
        <div className="mb-8 text-center">
          <h1 className="font-serif text-4xl" style={{color:'var(--text)'}}>Pulse</h1>
          <p className="font-mono text-xs mt-2" style={{color:'var(--muted)'}}>
            {mode === 'login' ? 'sign in to your workspace' : 'create a new workspace'}
          </p>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border-hi)',borderRadius:'10px',padding:'28px 28px 24px'}}>
          {error && (
            <div className="mb-5 font-mono text-xs px-3 py-2.5 rounded" style={{background:'rgba(248,81,73,.1)',color:'var(--neg)',border:'1px solid rgba(248,81,73,.2)'}}>
              {error}
            </div>
          )}
          <form onSubmit={submit} className="flex flex-col gap-4">
            <div className="flex flex-col gap-1.5">
              <label className="font-mono text-xs" style={{color:'var(--muted)'}}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required placeholder="you@company.com" className="ctrl" />
            </div>
            <div className="flex flex-col gap-1.5">
              <label className="font-mono text-xs" style={{color:'var(--muted)'}}>Password</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required placeholder="••••••••" minLength={6} className="ctrl" />
            </div>
            <button type="submit" disabled={loading} className="btn-primary mt-1">
              {loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Sign Up'}
            </button>
          </form>
        </div>
        <p className="font-mono text-xs text-center mt-5" style={{color:'var(--muted)'}}>
          {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
          <button onClick={() => { setMode(mode==='login'?'signup':'login'); setError(''); }}
            style={{color:'#58a6ff',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',font:'inherit'}}>
            {mode === 'login' ? 'Sign up' : 'Sign in'}
          </button>
        </p>
      </div>
    </div>
  );
}

/* ── FeedbackForm — all fields mandatory ── */
function FeedbackForm({ onAdd }) {
  const [title,     setTitle]     = React.useState('');
  const [content,   setContent]   = React.useState('');
  const [source,    setSource]    = React.useState('');
  const [category,  setCategory]  = React.useState('');
  const [sentiment, setSentiment] = React.useState('');
  const [loading,   setLoading]   = React.useState(false);
  const [open,      setOpen]      = React.useState(false);

  const canSubmit = title.trim() && content.trim() && source && category && sentiment;

  async function submit(e) {
    e.preventDefault();
    if (!canSubmit) return;
    setLoading(true);
    await onAdd({ title: title.trim(), content: content.trim(), source, category, sentiment });
    setTitle(''); setContent(''); setSource(''); setCategory(''); setSentiment('');
    setLoading(false);
    setOpen(false);
  }

  if (!open) {
    return (
      <button onClick={() => setOpen(true)} className="btn-primary flex items-center gap-2 text-sm">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
          <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
        Add Feedback
      </button>
    );
  }

  return (
    <form onSubmit={submit} className="fade-up" style={{background:'var(--surface)',border:'1px solid var(--border-hi)',borderRadius:'10px',padding:'20px 20px 16px'}}>
      <div className="flex items-center justify-between mb-4">
        <span className="font-sans font-600 text-sm" style={{color:'var(--text)'}}>New Feedback</span>
        <button type="button" onClick={() => setOpen(false)}
          style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:'18px',lineHeight:1,padding:'0 4px'}}>×</button>
      </div>
      <div className="flex flex-col gap-3">
        {/* Title */}
        <div className="flex flex-col gap-1">
          <label className="font-mono text-[10px]" style={{color:'var(--muted)'}}>Title <span style={{color:'var(--neg)'}}>*</span></label>
          <input
            type="text"
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="Short summary of the feedback…"
            className="ctrl"
            required
          />
        </div>
        {/* Description */}
        <div className="flex flex-col gap-1">
          <label className="font-mono text-[10px]" style={{color:'var(--muted)'}}>Description <span style={{color:'var(--neg)'}}>*</span></label>
          <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="Full details of the feedback…" className="ctrl" required />
        </div>
        <div className="grid grid-cols-3 gap-2">
          {[
            [source,    setSource,    SOURCES,    'Source'],
            [category,  setCategory,  CATEGORIES, 'Category'],
            [sentiment, setSentiment, SENTIMENTS, 'Sentiment'],
          ].map(([val, set, opts, label]) => (
            <div key={label} className="flex flex-col gap-1">
              <label className="font-mono text-[10px]" style={{color:'var(--muted)'}}>{label} <span style={{color:'var(--neg)'}}>*</span></label>
              <div className="relative">
                <select value={val} onChange={e => set(e.target.value)} className="ctrl pr-8 appearance-none cursor-pointer"
                  style={{color: val ? 'var(--text)' : 'var(--muted)'}}>
                  <option value="" disabled>Select…</option>
                  {opts.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
                <svg className="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2" width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="#7d8590" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
            </div>
          ))}
        </div>
        <div className="flex items-center justify-between mt-1">
          <span className="font-mono text-[10px]" style={{color:'var(--muted)'}}>
            <span style={{color:'var(--neg)'}}>*</span> all fields required
          </span>
          <div className="flex gap-2">
            <button type="button" onClick={() => setOpen(false)} className="btn-ghost">Cancel</button>
            <button type="submit" disabled={loading || !canSubmit} className="btn-primary text-sm">
              {loading ? 'Adding…' : 'Add Feedback'}
            </button>
          </div>
        </div>
      </div>
    </form>
  );
}

/* ── FeedbackDetailModal ── */
function FeedbackDetailModal({ item, onClose, onStatusChange, onDescriptionSave }) {
  const [description, setDescription] = React.useState(item.content);
  const [status,      setStatus]      = React.useState(item.status);
  const [saving,      setSaving]      = React.useState(false);
  const [saveSuccess, setSaveSuccess] = React.useState(false);
  const [warnUnsaved, setWarnUnsaved] = React.useState(false);

  // Track what's actually persisted so we can detect dirty state
  const savedDescription = React.useRef(item.content);
  const savedStatus      = React.useRef(item.status);

  const isDirty = description !== savedDescription.current || status !== savedStatus.current;

  function attemptClose() {
    if (isDirty) {
      setWarnUnsaved(true);
    } else {
      onClose();
    }
  }

  // Close on Escape
  React.useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') attemptClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [isDirty]);

  async function handleSave() {
    setSaving(true);
    if (description !== savedDescription.current) {
      await onDescriptionSave(item.id, description);
      savedDescription.current = description;
    }
    if (status !== savedStatus.current) {
      await onStatusChange(item.id, status);
      savedStatus.current = status;
    }
    setSaving(false);
    setSaveSuccess(true);
    setWarnUnsaved(false);
    setTimeout(() => setSaveSuccess(false), 2000);
  }

  const sentBadge = SENTIMENT_BADGE[item.sentiment] || 'badge-neu';
  const stripe    = SENTIMENT_STRIPE[item.sentiment] || 'card-neu';

  return (
    <div
      className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4"
      style={{background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)'}}
      onClick={e => { if (e.target === e.currentTarget) attemptClose(); }}
    >
      <div className={`modal-panel w-full max-w-lg max-h-[88vh] flex flex-col overflow-hidden ${stripe}`} style={{
        background:'var(--surface)',
        border:'1px solid var(--border-hi)',
        borderRadius:'10px',
      }}>
        {/* Header */}
        <div className="flex items-start justify-between gap-3 px-6 py-5 border-b" style={{borderColor:'var(--border)'}}>
          <div className="flex-1 min-w-0">
            <h2 className="font-sans font-600 text-base leading-snug" style={{color:'var(--text)',wordBreak:'break-word'}}>
              {item.title || <span style={{color:'var(--muted)',fontStyle:'italic'}}>Untitled</span>}
            </h2>
            <p className="font-mono text-[10px] mt-1.5" style={{color:'var(--muted)'}}>{fmtDate(item.createdAt)}</p>
          </div>
          <button onClick={attemptClose}
            style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:'20px',lineHeight:1,padding:'0 2px',flexShrink:0,marginTop:'2px'}}
            title="Close">×</button>
        </div>

        {/* Unsaved changes warning */}
        {warnUnsaved && (
          <div className="mx-6 mt-4 px-4 py-3 rounded-lg flex items-start justify-between gap-3 fade-up"
            style={{background:'rgba(210,153,34,.1)',border:'1px solid rgba(210,153,34,.3)',borderRadius:'8px'}}>
            <div className="flex items-start gap-2">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{color:'#d2a22a',flexShrink:0,marginTop:'1px'}}>
                <path d="M8 1.5L1 13.5h14L8 1.5z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>
                <line x1="8" y1="6.5" x2="8" y2="9.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                <circle cx="8" cy="11.5" r="0.7" fill="currentColor"/>
              </svg>
              <p className="font-mono text-[11px] leading-relaxed" style={{color:'#d2a22a'}}>
                You have unsaved changes — close anyway and lose them?
              </p>
            </div>
            <div className="flex gap-2 shrink-0">
              <button onClick={() => setWarnUnsaved(false)} className="font-mono text-[10px] px-2 py-1 rounded"
                style={{background:'transparent',border:'1px solid rgba(210,153,34,.4)',color:'#d2a22a',cursor:'pointer'}}>
                Keep editing
              </button>
              <button onClick={onClose} className="font-mono text-[10px] px-2 py-1 rounded"
                style={{background:'rgba(248,81,73,.15)',border:'1px solid rgba(248,81,73,.3)',color:'var(--neg)',cursor:'pointer'}}>
                Discard & close
              </button>
            </div>
          </div>
        )}

        {/* Body */}
        <div className="flex-1 overflow-y-auto px-6 py-5 flex flex-col gap-5">

          {/* Badges row */}
          <div className="flex flex-wrap items-center gap-1.5">
            <span className={`badge ${sentBadge}`}>{item.sentiment}</span>
            <span className="badge badge-category">{item.category}</span>
            <span className="badge badge-source">{item.source}</span>
          </div>

          {/* Description — edited locally, saved only on Save click */}
          <div className="flex flex-col gap-1.5">
            <label className="font-mono text-[10px] uppercase tracking-wider" style={{color:'var(--muted)'}}>Description</label>
            <textarea
              value={description}
              onChange={e => { setDescription(e.target.value); setWarnUnsaved(false); }}
              rows={5}
              className="ctrl"
              placeholder="No description yet…"
            />
          </div>

          {/* Status — edited locally, saved only on Save click */}
          <div className="flex flex-col gap-1.5">
            <label className="font-mono text-[10px] uppercase tracking-wider" style={{color:'var(--muted)'}}>Status</label>
            <div className="flex gap-2 flex-wrap">
              {STATUSES.map(s => (
                <button key={s} onClick={() => { setStatus(s); setWarnUnsaved(false); }}
                  className={`badge ${STATUS_BADGE[s]}`}
                  style={{
                    cursor:'pointer',
                    opacity: status === s ? 1 : 0.4,
                    transform: status === s ? 'scale(1.05)' : 'scale(1)',
                    transition: 'opacity .15s, transform .15s',
                    border: status === s ? undefined : '1px solid var(--border-hi)',
                  }}>
                  {STATUS_LABEL[s]}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Footer — Save only, no Close button */}
        <div className="px-6 py-4 border-t flex items-center justify-between" style={{borderColor:'var(--border)'}}>
          <span className="font-mono text-[10px]" style={{color: isDirty ? '#d2a22a' : 'var(--muted)'}}>
            {saving ? 'Saving…' : saveSuccess ? '✓ Saved' : isDirty ? 'Unsaved changes' : 'No changes'}
          </span>
          <button onClick={handleSave} disabled={saving || !isDirty}
            className="btn-primary text-sm"
            style={{opacity: isDirty ? 1 : 0.45, cursor: isDirty ? 'pointer' : 'not-allowed'}}>
            {saving ? 'Saving…' : saveSuccess ? '✓ Saved' : 'Save changes'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── FeedbackCard — title only, click to open modal, confirm before delete ── */
function FeedbackCard({ item, onDelete, onOpenDetail }) {
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const [deleting,      setDeleting]      = React.useState(false);

  async function handleDeleteConfirmed(e) {
    e.stopPropagation();
    setDeleting(true);
    await onDelete(item.id);
  }

  const stripe    = SENTIMENT_STRIPE[item.sentiment] || 'card-neu';
  const sentBadge = SENTIMENT_BADGE[item.sentiment]  || 'badge-neu';
  const statBadge = STATUS_BADGE[item.status]        || 'badge-open';

  return (
    <div
      className={`fade-up feedback-card-clickable ${stripe}`}
      onClick={() => !deleting && !confirmDelete && onOpenDetail(item)}
      style={{
        background:'var(--surface)',
        border:'1px solid var(--border)',
        borderRadius:'8px',
        padding:'14px 16px',
        opacity: deleting ? 0.4 : 1,
        transition:'opacity .2s',
      }}
    >
      {/* Delete confirmation overlay */}
      {confirmDelete ? (
        <div className="flex items-center justify-between gap-3" onClick={e => e.stopPropagation()}>
          <p className="font-mono text-xs" style={{color:'var(--muted)'}}>
            Remove this feedback permanently?
          </p>
          <div className="flex gap-2 shrink-0">
            <button
              onClick={e => { e.stopPropagation(); setConfirmDelete(false); }}
              className="font-mono text-[10px] px-2.5 py-1 rounded"
              style={{background:'transparent',border:'1px solid var(--border-hi)',color:'var(--muted)',cursor:'pointer'}}>
              Cancel
            </button>
            <button
              onClick={handleDeleteConfirmed}
              disabled={deleting}
              className="font-mono text-[10px] px-2.5 py-1 rounded"
              style={{background:'rgba(248,81,73,.15)',border:'1px solid rgba(248,81,73,.35)',color:'var(--neg)',cursor:'pointer'}}>
              {deleting ? 'Removing…' : 'Yes, remove'}
            </button>
          </div>
        </div>
      ) : (
        <>
          <div className="flex items-start justify-between gap-3">
            <p className="font-sans text-sm font-500 leading-snug flex-1" style={{color:'var(--text)',wordBreak:'break-word'}}>
              {item.title || <span style={{color:'var(--muted)',fontStyle:'italic'}}>Untitled</span>}
            </p>
            <button
              onClick={e => { e.stopPropagation(); setConfirmDelete(true); }}
              className="btn-ghost shrink-0 mt-0.5"
              title="Delete feedback">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
          <div className="flex flex-wrap items-center gap-1.5 mt-3">
            <span className={`badge ${sentBadge}`}>{item.sentiment}</span>
            <span className="badge badge-category">{item.category}</span>
            <span className="badge badge-source">{item.source}</span>
            <span className={`badge ${statBadge} ml-auto`}>{STATUS_LABEL[item.status]}</span>
          </div>
          <p className="font-mono text-[10px] mt-2" style={{color:'var(--muted)'}}>{fmtDate(item.createdAt)}</p>
        </>
      )}
    </div>
  );
}

/* ── Category Breakdown — count only, no percentage ── */
function CategoryBreakdown({ items, activeCategoryFilter, onCategoryClick }) {
  return (
    <div className="fade-up mb-6" style={{
      background:'var(--surface)',
      border:'1px solid var(--border-hi)',
      borderRadius:'10px',
      padding:'16px 18px',
    }}>
      <p className="font-mono text-[10px] uppercase tracking-wider mb-3" style={{color:'var(--muted)'}}>
        — Category Breakdown
      </p>
      <div className="flex flex-col gap-1">
        {CATEGORIES.map(cat => {
          const total = items.length;
          const count = items.filter(i => i.category === cat).length;
          const pct   = total > 0 ? Math.round((count / total) * 100) : 0;
          const color = CAT_COLOR[cat];
          const isActive = activeCategoryFilter === cat;

          return (
            <div key={cat} className={`cat-row${isActive ? ' active' : ''}`} onClick={() => onCategoryClick(cat)} title={`Filter by ${cat}`}>
              <span style={{width:7,height:7,borderRadius:'50%',background:color,flexShrink:0,boxShadow:isActive?`0 0 6px ${color}`:'none',transition:'box-shadow .2s'}} />
              <span className="font-sans text-xs shrink-0" style={{color:isActive?color:'var(--text)',width:112,transition:'color .15s'}}>{cat}</span>
              <div className="progress-track">
                <div className="progress-fill" style={{width:`${pct}%`,background:color,opacity:isActive?1:0.55}} />
              </div>
              {/* count only — no percentage */}
              <span className="font-mono text-[10px] shrink-0" style={{color:isActive?color:'var(--muted)',width:22,textAlign:'right',transition:'color .15s'}}>
                {count}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Main Tracker ── */
function FeedbackTracker({ user }) {
  const [items,           setItems]           = React.useState([]);
  const [loading,         setLoading]         = React.useState(true);
  const [error,           setError]           = React.useState('');
  const [sentimentFilter, setSentimentFilter] = React.useState('all');
  const [statusFilter,    setStatusFilter]    = React.useState('all');
  const [sourceFilter,    setSourceFilter]    = React.useState('all');
  const [categoryFilter,  setCategoryFilter]  = React.useState('all');
  const [aiLoading,       setAiLoading]       = React.useState(false);
  const [aiAnalysis,      setAiAnalysis]      = React.useState(null);
  const [aiError,         setAiError]         = React.useState('');
  const [detailItem,      setDetailItem]      = React.useState(null);

  const errTimer = React.useRef(null);
  function showError(msg) {
    setError(msg);
    clearTimeout(errTimer.current);
    errTimer.current = setTimeout(() => setError(''), 4000);
  }

  React.useEffect(() => {
    (async () => {
      const { data, error } = await sb.from('feedback').select('*').order('created_at', { ascending: false });
      if (error) showError('Failed to load: ' + error.message);
      else setItems(data.map(rowToItem));
      setLoading(false);
    })();
  }, []);

  async function handleAdd(fields) {
    const { data: { user: u } } = await sb.auth.getUser();
    const payload = { ...fields, status: 'open', user_id: u?.id };
    const { data, error } = await sb.from('feedback').insert(payload).select().single();
    if (error) { showError('Failed to add: ' + error.message); return; }
    setItems(prev => [rowToItem(data), ...prev]);
  }

  async function handleDelete(id) {
    setItems(prev => prev.filter(i => i.id !== id));
    const { error } = await sb.from('feedback').delete().eq('id', id);
    if (error) {
      showError('Failed to delete: ' + error.message);
      const { data } = await sb.from('feedback').select('*').order('created_at', { ascending: false });
      if (data) setItems(data.map(rowToItem));
    }
  }

  async function handleStatusChange(id, status) {
    setItems(prev => prev.map(i => i.id === id ? { ...i, status } : i));
    // Keep modal item in sync
    setDetailItem(prev => prev?.id === id ? { ...prev, status } : prev);
    const { error } = await sb.from('feedback').update({ status }).eq('id', id);
    if (error) showError('Failed to update status: ' + error.message);
  }

  async function handleDescriptionSave(id, content) {
    setItems(prev => prev.map(i => i.id === id ? { ...i, content } : i));
    setDetailItem(prev => prev?.id === id ? { ...prev, content } : prev);
    const { error } = await sb.from('feedback').update({ content }).eq('id', id);
    if (error) showError('Failed to save description: ' + error.message);
  }

  async function handleAIAnalysis() {
    setAiLoading(true); setAiError(''); setAiAnalysis(null);
    const active = items.filter(i => i.status === 'open' || i.status === 'inprogress');
    if (active.length === 0) {
      setAiError('No open or in-progress feedback to analyze.');
      setAiLoading(false); return;
    }
    try {
      const result = await runGroqAnalysis(items);
      setAiAnalysis(result);
    } catch (e) {
      setAiError('AI analysis failed: ' + (e.message || 'Unknown error'));
    }
    setAiLoading(false);
  }

  async function handleLogout() { await sb.auth.signOut(); }

  function handleCategoryClick(cat) {
    setCategoryFilter(prev => prev === cat ? 'all' : cat);
  }

  function clearFilters() {
    setSentimentFilter('all');
    setStatusFilter('all');
    setSourceFilter('all');
    setCategoryFilter('all');
  }

  const hasActiveFilter = sentimentFilter !== 'all' || statusFilter !== 'all' || sourceFilter !== 'all' || categoryFilter !== 'all';

  const displayed = items
    .filter(i => sentimentFilter === 'all' || i.sentiment === sentimentFilter)
    .filter(i => statusFilter    === 'all' || i.status    === statusFilter)
    .filter(i => sourceFilter    === 'all' || i.source    === sourceFilter)
    .filter(i => categoryFilter  === 'all' || i.category  === categoryFilter);

  const total = items.length;
  const pos   = items.filter(i => i.sentiment === 'Positive').length;
  const neg   = items.filter(i => i.sentiment === 'Negative').length;
  const neu   = items.filter(i => i.sentiment === 'Neutral').length;
  const countOpen       = items.filter(i => i.status === 'open').length;
  const countInProgress = items.filter(i => i.status === 'inprogress').length;
  const countAddressed  = items.filter(i => i.status === 'addressed').length;
  const activeCount     = countOpen + countInProgress;

  function pct(n) {
    if (total === 0) return '0%';
    return Math.round((n / total) * 100) + '%';
  }

  return (
    <div style={{minHeight:'100vh',maxWidth:'780px',margin:'0 auto',padding:'40px 24px 80px'}}>

      {error && (
        <div className="mb-6 font-mono text-xs px-4 py-3 rounded-lg flex items-center justify-between fade-up"
          style={{background:'rgba(248,81,73,.1)',color:'var(--neg)',border:'1px solid rgba(248,81,73,.2)'}}>
          <span>{error}</span>
          <button onClick={() => setError('')} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontSize:'16px',lineHeight:1}}>×</button>
        </div>
      )}

      {/* Header */}
      <div className="flex items-start justify-between mb-2">
        <div>
          <h1 className="font-serif text-3xl" style={{color:'var(--text)'}}>Pulse</h1>
          <p className="font-mono text-xs mt-0.5" style={{color:'var(--muted)'}}>feedback tracker</p>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={handleAIAnalysis} disabled={aiLoading || loading} className="btn-ai">
            {aiLoading ? (
              <svg className="spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
            ) : (
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            )}
            {aiLoading ? 'Analyzing…' : 'AI Analysis'}
            {!aiLoading && activeCount > 0 && (
              <span className="font-mono text-[9px]" style={{background:'rgba(88,166,255,.2)',padding:'1px 5px',borderRadius:'3px'}}>{activeCount}</span>
            )}
          </button>
          <span className="font-mono text-xs hidden sm:block" style={{color:'var(--muted)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {user.email}
          </span>
          <button onClick={handleLogout} className="btn-ghost">Sign out</button>
        </div>
      </div>

      {/* Status summary */}
      {!loading && total > 0 && (
        <div className="flex items-center gap-3 mb-7 fade-up" style={{paddingLeft:'1px'}}>
          {[
            { label:'Open',        count:countOpen,       color:'var(--muted)' },
            { label:'In Progress', count:countInProgress, color:'#d2a22a' },
            { label:'Addressed',   count:countAddressed,  color:'var(--pos)' },
          ].map((s, i) => (
            <React.Fragment key={s.label}>
              {i > 0 && <span style={{color:'var(--border-hi)',fontSize:'10px',userSelect:'none'}}>·</span>}
              <span className="font-mono text-[10px]" style={{color:'var(--muted)'}}>
                <span style={{color:s.color,fontWeight:500}}>{s.count}</span>{' '}{s.label}
              </span>
            </React.Fragment>
          ))}
        </div>
      )}

      {/* Sentiment stats */}
      {!loading && total > 0 && (
        <div className="grid grid-cols-3 gap-3 mb-5 fade-up">
          {[
            { label:'Positive', count:pos, color:'var(--pos)', bg:'rgba(57,211,83,.07)',  border:'rgba(57,211,83,.18)' },
            { label:'Negative', count:neg, color:'var(--neg)', bg:'rgba(248,81,73,.07)', border:'rgba(248,81,73,.18)' },
            { label:'Neutral',  count:neu, color:'var(--neu)', bg:'rgba(88,166,255,.07)',border:'rgba(88,166,255,.18)' },
          ].map(s => (
            <div key={s.label} style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:'8px',padding:'12px 16px',display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
              <div>
                <p className="font-mono text-xl font-500" style={{color:s.color,lineHeight:1}}>{s.count}</p>
                <p className="font-mono text-[10px] mt-1" style={{color:'var(--muted)'}}>{s.label}</p>
              </div>
              <p className="font-mono text-lg" style={{color:s.color,opacity:0.45,lineHeight:1}}>{pct(s.count)}</p>
            </div>
          ))}
        </div>
      )}

      {/* Category Breakdown */}
      {!loading && total > 0 && (
        <CategoryBreakdown items={items} activeCategoryFilter={categoryFilter} onCategoryClick={handleCategoryClick} />
      )}

      {aiError && (
        <div className="mb-5 fade-up font-mono text-xs px-4 py-3 rounded-lg flex items-center justify-between"
          style={{background:'rgba(248,81,73,.08)',color:'var(--neg)',border:'1px solid rgba(248,81,73,.2)'}}>
          <span>{aiError}</span>
          <button onClick={() => setAiError('')} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontSize:'16px',lineHeight:1}}>×</button>
        </div>
      )}

      {aiAnalysis && <AIAnalysisPanel analysis={aiAnalysis} onDismiss={() => setAiAnalysis(null)} />}

      {/* Filter row + Add button — Add is pinned top-right, never shifts */}
      <div className="flex items-start justify-between gap-4 mb-2">
        <div className="flex-1 min-w-0">
          <FilterBar
            sentimentFilter={sentimentFilter} setSentimentFilter={setSentimentFilter}
            statusFilter={statusFilter}       setStatusFilter={setStatusFilter}
            sourceFilter={sourceFilter}       setSourceFilter={setSourceFilter}
            hasActiveFilter={hasActiveFilter}
            onClear={clearFilters}
          />
        </div>
        <div className="shrink-0 pt-0.5">
          <FeedbackForm onAdd={handleAdd} />
        </div>
      </div>

      {/* Active filter label */}
      {hasActiveFilter && (
        <div className="mb-4 fade-up flex items-center gap-2 flex-wrap">
          <span className="font-mono text-[10px]" style={{color:'var(--muted)'}}>Showing:</span>
          {sentimentFilter !== 'all' && <span className={`badge ${SENTIMENT_BADGE[sentimentFilter]}`}>{sentimentFilter}</span>}
          {statusFilter    !== 'all' && <span className={`badge ${STATUS_BADGE[statusFilter]}`}>{STATUS_LABEL[statusFilter]}</span>}
          {sourceFilter    !== 'all' && <span className="badge badge-source">{sourceFilter}</span>}
          {categoryFilter  !== 'all' && (
            <span className="badge" style={{background:CAT_BG[categoryFilter],color:CAT_COLOR[categoryFilter],border:`1px solid ${CAT_COLOR[categoryFilter]}44`}}>
              {categoryFilter}
            </span>
          )}
          <span className="font-mono text-[10px]" style={{color:'var(--muted)'}}>
            — {displayed.length} item{displayed.length !== 1 ? 's' : ''}
          </span>
        </div>
      )}

      {/* Cards */}
      {loading ? (
        <div className="flex flex-col gap-3">
          {[1,2,3].map(n => (
            <div key={n} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px',padding:'16px'}}>
              <div className="skel h-4 mb-3" style={{width:`${60+n*10}%`}} />
              <div className="skel h-3" style={{width:'40%'}} />
            </div>
          ))}
        </div>
      ) : displayed.length === 0 ? (
        <div className="text-center py-20 fade-up">
          <p className="font-serif text-2xl italic mb-2" style={{color:'var(--muted)'}}>
            {!hasActiveFilter ? 'No feedback yet' : 'No matching feedback'}
          </p>
          <p className="font-mono text-xs" style={{color:'var(--muted)',opacity:.6}}>
            {!hasActiveFilter ? 'Add your first item above.' : 'Try a different filter or clear the current one.'}
          </p>
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          {displayed.map(item => (
            <FeedbackCard key={item.id} item={item} onDelete={handleDelete} onOpenDetail={setDetailItem} />
          ))}
        </div>
      )}

      {/* Detail modal */}
      {detailItem && (
        <FeedbackDetailModal
          item={detailItem}
          onClose={() => setDetailItem(null)}
          onStatusChange={handleStatusChange}
          onDescriptionSave={handleDescriptionSave}
        />
      )}
    </div>
  );
}

/* ── App ── */
function App() {
  const [user, setUser] = React.useState(null);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? false));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? false);
    });
    return () => subscription.unsubscribe();
  }, []);

  if (user === null) return (
    <div className="min-h-screen flex items-center justify-center">
      <p className="font-mono text-xs" style={{color:'var(--muted)'}}>Loading…</p>
    </div>
  );
  if (user === false) return <AuthForm />;
  return <FeedbackTracker user={user} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
